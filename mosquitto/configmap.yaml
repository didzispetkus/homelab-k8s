apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
  namespace: mosquitto
  labels:
    app.kubernetes.io/name: mosquitto
    app.kubernetes.io/version: "2.1.2"
data:
  mosquitto.conf: |
    persistence true
    persistence_location /mosquitto/data/
    log_dest stdout
    # Enforce user authentication
    allow_anonymous false
    password_file /mosquitto/secret/passwd
    # Default listener for direct MQTT traffic
    listener 1883
    protocol mqtt
    # Listener for MQTT traffic over Websockets
    listener 9001
    protocol websockets