apiVersion: v1
kind: Service
metadata:
  name: mosquitto-service
  namespace: mosquitto
  labels:
    app.kubernetes.io/name: mosquitto
    app.kubernetes.io/version: "2.1.2"
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.20.190
  selector:
    app.kubernetes.io/name: mosquitto
  ports:
    - port: 1883
      targetPort: mqtt
      protocol: TCP
      name: mqtt
    - port: 9001
      targetPort: ws
      protocol: TCP
      name: ws