apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  namespace: mosquitto
  labels:
    app.kubernetes.io/name: mosquitto
    app.kubernetes.io/version: "2.0.22"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mosquitto
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mosquitto
        app.kubernetes.io/version: "2.0.22"
    spec:
      serviceAccountName: mosquitto-service-account
      securityContext:
        fsGroup: 1883
      volumes:
        - name: config
          configMap:
            name: mosquitto-config
        - name: secret
          secret:
            secretName: mosquitto-passwd
        - name: data
          persistentVolumeClaim:
            claimName: mosquitto-data
      containers:
        - name: mosquitto
          image: eclipse-mosquitto:2.0.22
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1883
            runAsGroup: 1883
          ports:
            - containerPort: 1883
              name: mqtt
              protocol: TCP
            - containerPort: 9001
              name: ws
              protocol: TCP
          volumeMounts:
            - mountPath: /mosquitto/config/
              name: config
            - mountPath: /mosquitto/secret/
              name: secret
              readOnly: true
            - mountPath: /mosquitto/data/
              name: data
          startupProbe:
            tcpSocket:
              port: 1883
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 1883
            failureThreshold: 3
            periodSeconds: 20
            successThreshold: 1
            timeoutSeconds: 2
          readinessProbe:
            tcpSocket:
              port: 1883
            failureThreshold: 3
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi