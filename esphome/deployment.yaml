apiVersion: apps/v1
kind: Deployment
metadata:
  name: esphome
  namespace: esphome
  labels:
    app.kubernetes.io/name: esphome
    app.kubernetes.io/version: "2026.4.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: esphome
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: esphome
        app.kubernetes.io/version: "2026.4.0"
    spec:
      serviceAccountName: esphome
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: esphome-config
        - name: cache
          emptyDir: {}
      containers:
        - name: esphome
          image: ghcr.io/esphome/esphome:2026.4.0
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: Europe/Riga
          ports:
            - name: http
              containerPort: 6052
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: cache
              mountPath: /config/.esphome  # cache dir on emptyDir — always clean on restart, never corrupts
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 30
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 3
            periodSeconds: 20
            successThreshold: 1
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 3
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 2000m
              memory: 1Gi