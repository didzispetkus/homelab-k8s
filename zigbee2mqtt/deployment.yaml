apiVersion: apps/v1
kind: Deployment
metadata:
  name: zigbee2mqtt
  namespace: zigbee2mqtt
  labels:
    app.kubernetes.io/name: zigbee2mqtt
    app.kubernetes.io/version: "2.9.1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zigbee2mqtt
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zigbee2mqtt
        app.kubernetes.io/version: "2.9.1"
    spec:
      serviceAccountName: zigbee2mqtt-service-account
      securityContext: {}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: zigbee2mqtt-data
      containers:
        - name: zigbee2mqtt
          image: koenkk/zigbee2mqtt:2.9.1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: TZ
              value: "Europe/Riga"
            - name: ZIGBEE2MQTT_DATA
              value: "/data"
            - name: ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_ENABLED
              value: "true"
            - name: ZIGBEE2MQTT_CONFIG_SERIAL_PORT
              value: "tcp://192.168.100.2:6638"
            - name: ZIGBEE2MQTT_CONFIG_SERIAL_BAUDRATE
              value: "115200"
            - name: ZIGBEE2MQTT_CONFIG_SERIAL_ADAPTER
              value: "zstack"
            - name: ZIGBEE2MQTT_CONFIG_SERIAL_DISABLE_LED
              value: "false"
            - name: ZIGBEE2MQTT_CONFIG_MQTT_SERVER
              value: "mqtt://mosquitto-service.mosquitto.svc.cluster.local:1883"
            - name: ZIGBEE2MQTT_CONFIG_MQTT_USER
              value: "mqttuser"
            - name: ZIGBEE2MQTT_CONFIG_MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zigbee2mqtt-mqtt-secret
                  key: mqtt-password
            - name: ZIGBEE2MQTT_CONFIG_ADVANCED_TRANSMIT_POWER
              value: "20"
            - name: ZIGBEE2MQTT_CONFIG_ADVANCED_CHANNEL
              value: "25"
            - name: ZIGBEE2MQTT_CONFIG_FRONTEND_ENABLED
              value: "true"
            - name: ZIGBEE2MQTT_CONFIG_FRONTEND_PACKAGE
              value: "zigbee2mqtt-windfront"
            # Disable joining after initial setup
            - name: ZIGBEE2MQTT_CONFIG_PERMIT_JOIN
              value: "false"
            # Fixed PAN ID — replace with your generated value
            - name: ZIGBEE2MQTT_CONFIG_ADVANCED_PAN_ID
              value: "24037"
            # Network key from SealedSecret
            - name: ZIGBEE2MQTT_CONFIG_ADVANCED_NETWORK_KEY
              valueFrom:
                secretKeyRef:
                  name: zigbee2mqtt-mqtt-secret
                  key: network-key
            # Log level
            - name: ZIGBEE2MQTT_CONFIG_ADVANCED_LOG_LEVEL
              value: "info"
            # Watchdog
            - name: ZIGBEE2MQTT_CONFIG_ADVANCED_WATCHDOG
              value: "default"
            - name: ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_ENABLED
              value: "true"
            - name: ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_DISCOVERY_TOPIC
              value: "homeassistant"
            - name: ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_STATUS_TOPIC
              value: "homeassistant/status"
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
          startupProbe:
            tcpSocket:
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            failureThreshold: 3
            periodSeconds: 20
            successThreshold: 1
            timeoutSeconds: 2
          readinessProbe:
            tcpSocket:
              port: 8080
            failureThreshold: 3
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi