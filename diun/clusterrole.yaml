apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: diun
  labels:
    app.kubernetes.io/name: diun
    app.kubernetes.io/version: "4.31.0"
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: diun
  labels:
    app.kubernetes.io/name: diun
    app.kubernetes.io/version: "4.31.0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: diun
subjects:
  - kind: ServiceAccount
    name: diun
    namespace: diun