# Traefik Helm values for Gateway API (bare-metal k3s)
# Chart: traefik/traefik
# Traefik version: v3.3 (pinned via appVersion in chart)

# Disable default Ingress class — we use Gateway API only
ingressClass:
  enabled: false
  isDefaultClass: false

# Disable built-in IngressRoute for dashboard — accessed via port-forward only
ingressRoute:
  dashboard:
    enabled: false

# Enable dashboard API on port 9000 (port-forward only, not exposed externally)
api:
  dashboard: true
  insecure: true

# Disable Prometheus metrics endpoints
metrics:
  prometheus: null

# Enable Gateway API provider
providers:
  kubernetesGateway:
    enabled: true
  kubernetesIngress:
    enabled: false

# Gateway configuration — Traefik will create the Gateway and GatewayClass automatically
gateway:
  enabled: true
  name: main-gateway
  namespace: ""  # defaults to traefik namespace
  annotations:
    cert-manager.io/cluster-issuer: cloudflare-clusterissuer
  listeners:
    web:
      port: 8000
      protocol: HTTP
      namespacePolicy:
        from: All
    websecure:
      port: 8443
      protocol: HTTPS
      namespacePolicy:
        from: All
      certificateRefs:
        - kind: Secret
          name: traefik-wildcard-tls
          namespace: traefik

# LoadBalancer service — MetalLB will assign this IP
service:
  enabled: true
  type: LoadBalancer
  annotations:
    metallb.universe.tf/loadBalancerIPs: 192.168.20.110
  spec:
    externalTrafficPolicy: Local

# Ports — must match listener ports above
ports:
  traefik:
    port: 9000
    expose:
      default: false  # not exposed externally — port-forward only
    exposedPort: 9000
    protocol: TCP
  web:
    port: 8000
    expose:
      default: true
    exposedPort: 80
    protocol: TCP
  websecure:
    port: 8443
    expose:
      default: true
    exposedPort: 443
    protocol: TCP

# Resource limits
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Security context
deployment:
  replicas: 1

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532